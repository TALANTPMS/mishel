<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат Лендинг</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="wrapper">
            <div class="header-content">
                <div class="header-left">
                    <div class="header-logo">
                        <image class="main-logo" src="images/main-logo.png"></image>
                        <div class="header-divider"></div>
                        <p class="description">Надёжная недвижимость <br>для жизни и бизнеса</p>
                    </div>
                </div>
                <div class="header-right">
                    <a class="connection-link">
                        <div class="phone-icon"><img src="images/phone.svg" alt="phone"></div>
                        <span class="phone-number">+7 (999) 999-99-99</span>
                    </a>
                    <a class="connection-button" data-remodal-target="modal-form-call">Заказать звонок</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Body -->
    <main class="body">
        <div class="wrapper">
            <div class="main-section__inner">

                <!-- Заголовок и подзаголовок -->
                <div class="main-section">
                    <div class="text-content">
                        <h2 class="main-title">Закажите ремонт <br> квартиры  <span class="price-range">от 9 800 ₽/м²</span> <br> с гарантией <span class="warrant">5 лет</span> <br> и <span class="payment">оплатой по факту</span></h2>
                        <h3 class="subtitle">Без авансов и скрытых доплат — Москва и МО</h3>
                    </div>
                    <div class="hero"><img src="images/hero.png" alt="hero"></div>
                </div>
                

                <!-- Чат окно -->
                <div class="chat-window">
                    <div class="chat-avatar">
                        <div class="avatar-placeholder">
                            <img src="images/avatar.png" alt="Татьяна" class="avatar-img">
                            <div class="online-indicator"></div>
                        </div>
                    </div>
                    <div class="chat-content-area">
                        <div class="chat-messages" id="chatMessages"></div>
                        <div class="chat-input-area">
                            <form id="chatForm" class="chat-form">
                                <input type="text" class="chat-input" id="chatInput" placeholder="Введите ваш вопрос..." autocomplete="off">
                                <button type="submit" class="chat-send-btn" id="sendBtn" aria-label="Отправить">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M3 12L21 3L12 21L11 13L3 12Z" fill="white"></path>
                                    </svg>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="wrapper">
            <div class="footer-content">
                <div class="footer-column">Ссылки</div>
                <div class="footer-column">Инфо о компании</div>
                <div class="footer-column">Контакты для связи</div>
            </div>
        </div>
    </footer>
    <script src="chat.js"></script>
</body>
</html>
